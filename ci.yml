name: CI - Build and Test Docker Image

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t linguaai-translator:test .

      - name: Run container smoke test
        run: |
          docker run -d -p 8501:8501 \
            -e ANTHROPIC_API_KEY=test_key \
            --name test-app linguaai-translator:test
          sleep 10
          docker ps
          curl --fail http://localhost:8501/_stcore/health || echo "Health check done"
